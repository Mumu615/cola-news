baseURL = "https://mumu615.github.io/cola-news/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "可乐资讯"
theme = "hugo-theme-stack"

hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 12

[services]
  [services.rss]
    limit = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[params]
  description = "AI 前沿资讯与 Twitter 简报"
  author = "可乐资讯"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false

  [params.homeInfoParams]
    Title = "可乐资讯"
    Content = "聚合 AI 资讯、Twitter 动态与简报，自动更新。"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "资讯"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 3

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 4
