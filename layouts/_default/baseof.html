<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ site.Title }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }} RSS" href="{{ "/index.xml" | relURL }}">
  {{ with resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ .RelPermalink }}" integrity="{{ .Data.Integrity }}">
  {{ end }}
  {{ block "head" . }}{{ end }}
</head>
<body>
  <div class="site-shell">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <header class="site-header">
      <a class="brand" href="{{ "/" | relURL }}">
        <span class="brand-mark">COLA</span>
        <span class="brand-text">
          <strong>{{ site.Title }}</strong>
          <small>AI 前沿与开源趋势日报</small>
        </span>
      </a>
      <nav class="site-nav">
        {{ range site.Menus.main }}
        <a href="{{ .URL }}" {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}class="active"{{ end }}>{{ .Name }}</a>
        {{ end }}
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>自动采集、结构化存储、静态发布。适合持续运营的技术资讯站。</p>
      <p><a href="{{ "/index.xml" | relURL }}">RSS</a> · <a href="{{ "/sitemap.xml" | relURL }}">Sitemap</a></p>
    </footer>
  </div>
</body>
</html>
