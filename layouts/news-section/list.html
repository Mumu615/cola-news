{{ define "main" }}
{{ $kind := .Params.newsType }}
{{ $pages := where site.RegularPages "Params.newsType" $kind }}
<section class="section-heading page-heading">
  <p class="eyebrow">Section</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</section>
{{ partial "post-cards.html" $pages }}
{{ end }}
